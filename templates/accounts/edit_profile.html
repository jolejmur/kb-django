{% extends 'base.html' %}

{% block title %}Edit Profile - Django CRM{% endblock %}

{% block header %}Edit Profile{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h5 class="card-title mb-0">Edit Your Profile</h5>
            </div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="id_first_name" class="form-label">First Name</label>
                            <input type="text" name="first_name" id="id_first_name" class="form-control" value="{{ user.first_name }}">
                        </div>
                        <div class="col-md-6">
                            <label for="id_last_name" class="form-label">Last Name</label>
                            <input type="text" name="last_name" id="id_last_name" class="form-control" value="{{ user.last_name }}">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_email" class="form-label">Email</label>
                        <input type="email" name="email" id="id_email" class="form-control" value="{{ user.email }}">
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_phone_number" class="form-label">Phone Number</label>
                        <input type="text" name="phone_number" id="id_phone_number" class="form-control" value="{{ user.phone_number|default:'' }}">
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_profile_picture" class="form-label">Profile Picture</label>
                        <input type="file" name="profile_picture" id="id_profile_picture" class="form-control">
                        {% if user.profile_picture %}
                            <div class="mt-2">
                                <img src="{{ user.profile_picture.url }}" alt="Current profile picture" class="img-thumbnail" style="max-width: 100px;">
                                <p class="text-muted">Current profile picture</p>
                            </div>
                        {% endif %}
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'accounts:profile' %}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
